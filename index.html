<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0B1220">
<meta name="description" content="Learning Quest — a Math, Science, Coding, Reading, Social Studies and Arts adventure for ages 5-7.">
<title>Learning Quest</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- Critical CSS inline so first paint (background + spinner) doesn't
     wait on a stylesheet round-trip; everything else loads as separate
     cacheable files. -->
<style>
  html,body{margin:0;padding:0;background:#0B1220;color:#F3F1FF;font-family:ui-rounded,"Segoe UI",system-ui,sans-serif;}
  #app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
  .boot-loader{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .boot-spinner{width:48px;height:48px;border-radius:50%;border:4px solid rgba(255,255,255,.15);border-top-color:#2EE6D6;animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .old-browser-banner{background:#FFC53D;color:#1B2A4A;text-align:center;padding:10px;font-weight:700;font-size:13px;}
</style>

<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/screens.css">
<link rel="stylesheet" href="css/games/math.css">
<link rel="stylesheet" href="css/games/coding.css">
<link rel="stylesheet" href="css/games/science.css">
<link rel="stylesheet" href="css/utilities.css">
</head>
<body>

<div id="app">
  <div class="boot-loader"><div class="boot-spinner"></div></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
